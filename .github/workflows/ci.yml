name: swe project - CI pipeline 

on:
  push:
    branches:
      - develop
      - feature/Develop-CI-pipeline

jobs:
  build:
    runs-on: ubuntu-latest

    environment: DEV

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS application
        run: npm run build
    
  testing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Start for testing
        run: | 
          echo 'Welcome to testing phase!!'


  dockerize:
    runs-on: ubuntu-latest
    needs: testing
    environment: DEV
    
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image and Push to registry
        id: meta
        run: |
          SERVICE_NAME="home-service"
          DATE_TIME=$(date -u +"%Y%m%d%H%M")
          BRANCH_NAME=$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          COMMIT_HASH=$(git rev-parse --short HEAD)

          IMAGE_TAG="${SERVICE_NAME}-${DATE_TIME}-${BRANCH_NAME}-${COMMIT_HASH}""

          echo "IMAGE TAG=$IMAGE_TAG" >> $GITHUB_ENV

          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/swe-project:${{ env.IMAGE_TAG }} .
          
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/swe-project:${{ env.IMAGE_TAG }}