name: swe project - CI pipeline 

on:
  # push:
  #   branches:
  #     - develop
  #     - feature/Develop-CI-pipeline
  
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose an ENV option to run"
        required: true
        type: choice
        options:
          - DEV
          - PROD
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build NestJS application
        run: npm run build
    
  testing:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Start for testing
        run: | 
          echo 'Welcome to testing phase!!'


  dockerize:
    runs-on: ubuntu-latest
    needs: testing
    environment: ${{ github.event.inputs.environment }}
    
    steps:
      - uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image and Push to registry
        id: meta
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          SERVICE_NAME="home-service"
          DATE_TIME=$(date -u +"%Y%m%d%H%M")
          BRANCH_NAME=$(echo "${GITHUB_REF_NAME}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          COMMIT_HASH=$(git rev-parse --short HEAD)

          IMAGE_TAG="${SERVICE_NAME}-${DATE_TIME}-${BRANCH_NAME}-${COMMIT_HASH}"

          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          docker build -t ${DOCKERHUB_USERNAME}/swe-project:${IMAGE_TAG} .
          
          docker push ${DOCKERHUB_USERNAME}/swe-project:${IMAGE_TAG}

  